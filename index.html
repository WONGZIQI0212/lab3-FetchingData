<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

  <!-- HEADER -->
  <header class="app-header">
    <h1 class="logo">⛅ WeatherNow</h1>
  </header>

  <!-- SEARCH BAR -->
  <section class="search-section">

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Search a city… e.g. Kuala Lumpur" />
      <button id="searchBtn">Search</button>
       <!-- BONUS -->
      <button id="toggleBtn" class="toggle-btn">°F</button>
    </div>

    <!-- ERROR BANNER (hidden until something goes wrong) -->
  <div id="errorBanner" class="error-banner hidden">
    <span id="errorMsg">Something went wrong.</span>
    <button id="retryBtn">Retry</button>
  </div>

  <!-- CURRENT WEATHER CARD -->
  <section class="current-card">

    <div class="current-left">
      <div class="city-name skeleton" id="cityName">&#8203;</div>
      <div class="weather-desc skeleton" id="weatherDesc">&#8203;</div>
      <div class="local-time skeleton" id="localTime">&#8203;</div>
    </div>

    <div class="current-right">
      <div class="weather-icon skeleton" id="weatherIcon">&#8203;</div>
      <div class="temperature skeleton" id="temperature">&#8203;</div>
    </div>

    <div class="current-details">
      <div class="detail-item">
        <span class="detail-label">Humidity</span>
        <span class="skeleton detail-value" id="humidity">&#8203;</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Wind</span>
        <span class="skeleton detail-value" id="windspeed">&#8203;</span>
      </div>
    </div>

  </section>

  <!-- 7-DAY FORECAST ROW -->
  <section class="forecast-section">
    <h2 class="section-title">7-Day Forecast</h2>
    <div class="forecast-row" id="forecastRow">
      <!-- JavaScript will build the 7 cards here -->
    </div>
  </section>

    <!-- shows if user types less than 2 characters -->
    <p id="validationMsg" class="validation-msg hidden"></p>
    <!-- BONUS -->
    <div id="historyRow" class="history-row"></div>

  </section>

  </div>

<!-- jQuery must come BEFORE app.js to avoid crash -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
